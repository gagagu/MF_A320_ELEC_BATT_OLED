; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs = ./**/*platformio.ini

[env]
lib_deps = 
	waspinator/AccelStepper @ 1.61
	https://github.com/MobiFlight/LiquidCrystal_I2C#v1.1.4
	https://github.com/MobiFlight/Arduino-CmdMessenger#4.2.1
	adafruit/Adafruit BusIO @ ^1.17.3
	adafruit/Adafruit GFX Library @ ^1.12.1
	adafruit/Adafruit SSD1306 @ ^2.5.15
	adafruit/Adafruit SH110X @ ^2.1.14
custom_lib_deps_atmel = 
	arduino-libraries/Servo @ 1.1.8
custom_lib_deps_pico = 
	ricaun/ArduinoUniqueID @ ^1.3.0
build_flags = 
	-DMF_REDUCE_FUNCT_LEDCONTROL
	-DMAXCALLBACKS=35
	-DSERIAL_RX_BUFFER_SIZE=96
	-DMESSENGERBUFFERSIZE=96
	-DMAXSTREAMBUFFERSIZE=96
	-DDEFAULT_TIMEOUT=5000
	-DMF_SEGMENT_SUPPORT
	-DMF_LCD_SUPPORT
	-DMF_STEPPER_SUPPORT
	-DMF_SERVO_SUPPORT
	-DMF_ANALOG_SUPPORT
	-DMF_OUTPUT_SHIFTER_SUPPORT
	-DMF_INPUT_SHIFTER_SUPPORT
	-DMF_MUX_SUPPORT
	-DMF_MUX_SUPPORT
	-DMF_DIGIN_MUX_SUPPORT
	-I./src/src
	-I./src/src/MF_Analog
	-I./src/src/MF_Button
	-I./src/src/MF_Encoder
	-I./src/src/MF_InputShifter
	-I./src/src/MF_DigInMux
	-I./src/src/MF_LCDDisplay
	-I./src/src/MF_Output
	-I./src/src/MF_OutputShifter
	-I./src/src/MF_Segment
	-I./src/src/MF_Servo
	-I./src/src/MF_Stepper
	-I./src/src/MF_Modules
build_src_filter = 
	+<*>
extra_scripts = 
	pre:get_version.py
	pre:get_CoreFiles.py
	copy_fw_files.py

[env_MF_A320_ELEC_BATT_OLED]
build_flags = 
	${env.build_flags}
	-DMF_CUSTOMDEVICE_SUPPORT=1
	-DSSD1306_NO_SPLASH
	-DSH110X_NO_SPLASH
	-I./src/src/MF_CustomDevice
	-I./MF_A320_ELEC_BATT_OLED
build_src_filter = 
	+<../MF_A320_ELEC_BATT_OLED>
lib_deps = 
custom_core_firmware_version = 3.0.0
custom_source_folder = MF_A320_ELEC_BATT_OLED
custom_community_project = gagagu_MF_A320_ELEC_BATT_OLED
custom_zip_filename = ${env_MF_A320_ELEC_BATT_OLED.custom_community_project}

[env:gagagu_mf_a320_elec_batt_oled_mega]
platform = atmelavr
board = megaatmega2560
framework = arduino
build_flags = 
	${env_MF_A320_ELEC_BATT_OLED.build_flags}
	'-DMOBIFLIGHT_TYPE="gagagu MF_A320_ELEC_BATT_OLED Mega"'
	'-DMOBIFLIGHT_NAME="gagagu MF_A320_ELEC_BATT_OLED"'
	-DMEMLEN_CONFIG=1496
	-DMEMLEN_NAMES_BUFFER=1000
	-DMF_MAX_DEVICEMEM=1600
build_unflags = 
build_src_filter = 
	${env.build_src_filter}
	${env_MF_A320_ELEC_BATT_OLED.build_src_filter}
lib_deps = 
	${env.lib_deps}
	${env.custom_lib_deps_Atmel}
	${env_MF_A320_ELEC_BATT_OLED.lib_deps}
	adafruit/Adafruit BusIO@^1.17.3
monitor_speed = 115200
extra_scripts = 
	${env.extra_scripts}
custom_core_firmware_version = ${env_MF_A320_ELEC_BATT_OLED.custom_core_firmware_version}
custom_community_project = ${env_MF_A320_ELEC_BATT_OLED.custom_community_project}
custom_source_folder = ${env_MF_A320_ELEC_BATT_OLED.custom_source_folder}
custom_zip_filename = ${env_MF_A320_ELEC_BATT_OLED.custom_zip_filename}
