; ******************************************************************************************
; working environment for template of custom firmware
; ******************************************************************************************
; Common build settings across this custom device
[env_MF_A320_ELEC_BATT_OLED]
build_flags =
	${env.build_flags}												; include standard build flags
	-DMF_CUSTOMDEVICE_SUPPORT=1										; Required for Custom Devices
	;-DMF_CUSTOMDEVICE_HAS_UPDATE									; if the custom device needs to be updated, uncomment this. W/o the following define it will be done each loop()
	;-DMF_CUSTOMDEVICE_POLL_MS=10 									; time in ms between updating custom device, uncomment this if custom device needs to be updated regulary
	;-DHAS_CONFIG_IN_FLASH											; undefine this and add your configuration to MFCustomDevicesConfig.h to save the config in Flash !!Core FW version must be at least 2.5.2!!
	;-DREVERSED_OUTPUT_OUTPUT										; for reversed output logic on outputs
	;-DREVERSED_OUTPUT_OUTPUTSHIFTER								; for reversed output logic on outputshifter
	;-DDEBUG2CMDMESSENGER											; uncomment this to get debug messages for the connector log
	-DSSD1306_NO_SPLASH									; disable Adafruit splash logo for SSD1306 displays
	-DSH110X_NO_SPLASH									; disable Adafruit splash logo for SH1106 displays
	-I./src/src/MF_CustomDevice										; don't change this one!
	-I./MF_A320_ELEC_BATT_OLED													; Include files for your custom device, replace "MF_A320_ELEC_BATT_OLED" by your folder name
build_src_filter = 
	+<../MF_A320_ELEC_BATT_OLED>													; build files for your custom device, replace "MF_A320_ELEC_BATT_OLED" by your folder name
lib_deps =															; You can add additional libraries if required
	waspinator/AccelStepper @ 1.61
	https://github.com/MobiFlight/LiquidCrystal_I2C#v1.1.4
	https://github.com/MobiFlight/Arduino-CmdMessenger#4.2.1
	https://github.com/PaulStoffregen/SPI
	adafruit/Adafruit BusIO @ ^1.17.3
	adafruit/Adafruit GFX Library @ ^1.12.1
	adafruit/Adafruit SSD1306 @ ^2.5.15
	adafruit/Adafruit SH110X @ ^2.1.14
custom_core_firmware_version = 3.0.0								; define the version from the core firmware files your build should base on
custom_source_folder = MF_A320_ELEC_BATT_OLED										; path to your Custom Device Sources, replace "MF_A320_ELEC_BATT_OLED" by your folder name
custom_community_project = 	gagagu_MF_A320_ELEC_BATT_OLED								; Folder name inside zip file, also ZIP file name if "custom_zip_filename" is not changed
custom_zip_filename = ${env_MF_A320_ELEC_BATT_OLED.custom_community_project}		; Name of the zip-file, overwrite it to define an different zip-file name

; Build settings for the Arduino Mega with Custom Firmware MF_A320_ELEC_BATT_OLED
[env:gagagu_mf_a320_elec_batt_oled_mega]
platform = atmelavr
board = megaatmega2560
framework = arduino
build_flags = 
	${env_MF_A320_ELEC_BATT_OLED.build_flags}										; don't change this one!
	'-DMOBIFLIGHT_TYPE="gagagu MF_A320_ELEC_BATT_OLED Mega"'					; this must match with "MobiFlightType" within the .json file
	'-DMOBIFLIGHT_NAME="gagagu MF_A320_ELEC_BATT_OLED"' 						; this will show up as Name in the settings dialog unless it gets change from there
	-DMEMLEN_CONFIG=1496											; max. size for config which wil be stored in EEPROM
	-DMEMLEN_NAMES_BUFFER=1000										; max. size for configBuffer, contains only names from inputs
	-DMF_MAX_DEVICEMEM=1600											; max. memory size for devices
build_unflags =
	;-DMF_STEPPER_SUPPORT											; this is just an example how to deactivate a device
build_src_filter = 
	${env.build_src_filter}											; don't change this one!
	${env_MF_A320_ELEC_BATT_OLED.build_src_filter}								; don't change this one!
lib_deps = 
	${env.lib_deps}													; don't change this one!
	${env.custom_lib_deps_Atmel}									; don't change this one!
	${env_MF_A320_ELEC_BATT_OLED.lib_deps}										; don't change this one!
monitor_speed = 115200												; don't change this one!
extra_scripts = 
	${env.extra_scripts}											; don't change this one!
custom_core_firmware_version = ${env_MF_A320_ELEC_BATT_OLED.custom_core_firmware_version}	; don't change this one!
custom_community_project = ${env_MF_A320_ELEC_BATT_OLED.custom_community_project}			; don't change this one!
custom_source_folder = ${env_MF_A320_ELEC_BATT_OLED.custom_source_folder}					; don't change this one!
custom_zip_filename = ${env_MF_A320_ELEC_BATT_OLED.custom_zip_filename}			; don't change this one!

